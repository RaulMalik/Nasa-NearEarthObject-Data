name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - run: uv run ruff check src tests
      - run: uv run pytest -q
